version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: postgres-bot
    restart: always
    environment:
      POSTGRES_DB: botdb
      POSTGRES_USER: botuser
      POSTGRES_PASSWORD: botpass
    volumes:
      - postgres_bot_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis-memoria
    restart: always
    volumes:
      - redis_bot_data:/data

  backend:
    build: ./backend
    container_name: backend-bot
    restart: always
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: frontend-bot
    restart: always
    depends_on:
      - backend
    ports:
      - "3001:3000"

volumes:
  postgres_bot_data:
  redis_bot_data:
